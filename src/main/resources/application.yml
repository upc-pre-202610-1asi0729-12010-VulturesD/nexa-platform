spring:
  application:
    name: nexa-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

nexa:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-with-at-least-32-characters}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
