spring:
  datasource:
    url: jdbc:h2:mem:nexa_platform_local;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        physical_naming_strategy: com.nexa.platform.shared.infrastructure.persistence.jpa.strategy.SnakeCasePhysicalNamingStrategy
  h2:
    console:
      enabled: true
