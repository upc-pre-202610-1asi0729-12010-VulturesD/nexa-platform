spring:
  datasource:
    url: jdbc:h2:mem:nexa_platform_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: false
nexa:
  jwt:
    secret: test-secret-with-enough-length-for-hmac-signing-key
    expiration-minutes: 60
